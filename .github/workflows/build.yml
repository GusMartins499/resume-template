name: Build

on:
  push:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra texlive-lang-portuguese

      - name: Build English Resume
        working-directory: resumes/en
        run: pdflatex resume.tex

      - name: Build Portuguese Resume
        working-directory: resumes/pt-br
        run: pdflatex curriculo.tex

      - name: Upload generated PDFs to GitHub Actions Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resumes
          path: |
            resumes/en/resume.pdf
            resumes/pt-br/curriculo.pdf

      - name: Assemble site
        run: |
          mkdir -p site/en site/pt-br
          cp web/index.html site/index.html
          cp resumes/en/resume.pdf site/en/resume.pdf
          cp resumes/pt-br/curriculo.pdf site/pt-br/curriculo.pdf

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: generate-pdf
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
